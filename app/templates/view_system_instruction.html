{% extends "base.html" %}

{% block title %}
    Viser: {{ title }} - {{ super() }}
{% endblock %}

{% block content %}
    <h2>Systeminstruksjon: {{ filename }}</h2>
    <div class="code-block-container">
        <pre><code>{{ content }}</code></pre>
    </div>
    <p><a href="{{ url_for('list_system_instructions') }}">Tilbake til listen over systeminstrukser</a></p>
    <p><a href="{{ url_for('index') }}">Tilbake til hovedsiden</a></p>

    <style>
        .code-block-container {
            background-color: #f8f9fa; /* Lys grå bakgrunn, ligner på GitHub */
            border: 1px solid #dee2e6; /* Diskret kantlinje */
            border-radius: 6px; /* Avrundede hjørner */
            padding: 16px; /* Innvendig polstring */
            overflow-x: auto; /* Horisontal scroll hvis innholdet er bredt */
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, Courier, monospace; /* Monospace font-stack */
            font-size: 0.875em; /* Litt mindre fontstørrelse */
        }
        .code-block-container pre {
            margin: 0; /* Fjern standard <pre> margin */
            white-space: pre-wrap; /* Bryt lange linjer, bevar mellomrom */
            word-wrap: break-word; /* Bryt lange ord */
        }
    </style>
{% endblock %}
